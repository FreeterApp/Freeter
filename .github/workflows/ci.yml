name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Deps
        run: npm install

      - name: Run Tests
        run: npm run test

      - name: Compile
        run: npm run prod

      - name: Run Linter
        run: npm run lint

      - name: Run Type-checking for Tests
        run: npm run test:typecheck
